services:
  swagger:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src/public/swagger.html:/usr/share/nginx/html/index.html:ro
      - ./docker/swagger.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    container_name: mysql
    image: mysql:latest
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - mysql_data:/var/lib/mysql
  app:
    build: .
    image: projeto-final/backend
    env_file:
      - src/.env
    environment:
      DB_HOST: mysql
    ports:
      - "8000:8000"
    volumes:
      - app_storage:/app/src/storage
    depends_on:
      - mysql
volumes:
  mysql_data: {}
  app_storage: {}